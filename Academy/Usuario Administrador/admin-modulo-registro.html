<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro de modulo | Banasan Academy</title>
  <link rel="stylesheet" href="../../academy-catalogo.css" />
</head>
<body data-module="academy" data-role="admin">
  <div class="academy-app academy-only">
    <header class="academy-topbar admin-topbar">
      <a class="academy-module-brand" href="admin.html"><svg class="academy-brand-icon icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5z"></path><path d="M8 6h8"></path><path d="M8 10h6"></path></svg><span>Banasan Academy</span></a>
      <nav class="academy-topnav" aria-label="Menu principal"><a href="admin.html">Inicio</a><a class="active" href="admin-modulos.html">Gestion</a></nav>
      <div class="academy-top-actions"><details class="module-selector"><summary><span>Libreria: Academy</span><svg class="icon small-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m6 9 6 6 6-6"></path></svg></summary><div class="module-selector-menu"><a class="active" href="../index.html">Academy <span>Actual</span></a></div></details><button class="profile-btn" type="button" aria-label="Perfil"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="8" r="4"></circle><path d="M4 21a8 8 0 0 1 16 0"></path></svg><span>AD</span></button></div>
    </header>
    <main class="academy-main">
      <nav class="admin-subnav" aria-label="Gestion Academy"><a class="active" href="admin-modulos.html">Modulos</a><a href="admin-cursos.html">Cursos</a><a href="admin-usuarios.html">Usuarios</a></nav>
      <section class="academy-page-head"><div><p class="page-eyebrow">Academy</p><h1>Crear modulo academico</h1><p>Define el agrupador academico que contendra cursos y reglas generales de visibilidad.</p></div><div class="academy-head-actions"><a class="btn btn-secondary" href="admin-modulos.html">Volver a modulos</a></div></section>
      <section class="card entity-section">
        <form class="admin-form-grid">
          <label class="field"><span>Nombre del modulo</span><input type="text" value="SAP" /></label>
          <label class="field"><span>Estado</span><select><option>Activo</option><option>Borrador</option><option>Inactivo</option></select></label>
          <label class="field wide"><span>Descripcion</span><textarea rows="4">Formacion por procesos SAP para areas corporativas.</textarea></label>
          <label class="field"><span>Areas relacionadas</span><input type="text" value="Tesoreria, Materiales, Compras" /></label>
          <label class="field"><span>Visibilidad sugerida</span><select><option>Areas especificas</option><option>Publico empresa</option><option>Publico externo</option><option>Usuarios especificos</option></select></label>
          <div class="admin-form-actions"><a class="btn btn-secondary" href="admin-modulos.html">Cancelar</a><button class="btn btn-primary" type="button">Guardar modulo</button></div>
        </form>
      </section>
    </main>
  </div>
  <script src="../../academy-catalogo.js"></script>
</body>
</html>
